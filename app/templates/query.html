{% extends "base.html" %}
{% block title %} — Custom Query{% endblock %}
{% block content %}
<h2>Custom Query</h2>
<p class="text-muted">Run a live MongoDB query against any collection. Results appear below.</p>

<div class="card border-0 shadow-sm mb-4">
  <div class="card-body">
    <div class="row g-3 mb-3">
      <div class="col-md-4">
        <label class="form-label fw-semibold">Collection</label>
        <select class="form-select" id="collection">
          {% for c in collections %}
          <option value="{{ c }}">{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold">Mode</label>
        <select class="form-select" id="mode" onchange="updatePlaceholder()">
          <option value="find">find (filter)</option>
          <option value="aggregate">aggregate (pipeline)</option>
        </select>
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <button class="btn btn-success w-100" onclick="runQuery()">&#9654; Run Query</button>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Query JSON</label>
      <textarea class="form-control font-monospace" id="queryInput" rows="5" spellcheck="false">{}</textarea>
      <div class="form-text" id="queryHint">find: enter a filter object, e.g. <code>{"status": "active"}</code></div>
    </div>

    <div class="mb-2 d-flex gap-2 flex-wrap" id="examples">
      <span class="text-muted small me-1">Examples:</span>
    </div>
  </div>
</div>

<div id="resultArea" style="display:none;">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h5 class="mb-0" id="resultTitle"></h5>
    <span class="badge-count" id="resultCount"></span>
  </div>
  <div class="table-responsive">
    <table class="table table-bordered table-hover shadow-sm" id="resultTable">
      <thead id="resultHead"></thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>
</div>

<div id="errorArea" class="alert alert-danger mt-3" style="display:none;"></div>

<script>
const EXAMPLES = {
  find: [
    { label: 'All records', query: '{}' },
    { label: 'Active members', query: '{"status": "active"}' },
    { label: 'Full Sun species', query: '{"requirements.sun": "Full Sun"}' },
    { label: 'Low water species', query: '{"requirements.water": "Low"}' },
  ],
  aggregate: [
    { label: 'Count per species', query: '[{"$group": {"_id": "$species", "count": {"$sum": 1}}}]' },
    { label: 'Total hours by member', query: '[{"$group": {"_id": "$member", "totalHours": {"$sum": "$hours"}}}, {"$sort": {"totalHours": -1}}]' },
    { label: 'Inventory totals', query: '[{"$group": {"_id": "$species", "qty": {"$sum": "$current_quantity"}}}, {"$sort": {"_id": 1}}]' },
    { label: 'Event attendance', query: '[{"$project": {"event_name": 1, "attendance": {"$add": [{"$size": "$guest_attendance"}, {"$size": "$member_attendance"}]}}}, {"$sort": {"attendance": -1}}]' },
  ]
};

function updatePlaceholder() {
  const mode = document.getElementById('mode').value;
  document.getElementById('queryInput').value = mode === 'aggregate' ? '[]' : '{}';
  document.getElementById('queryHint').innerHTML = mode === 'aggregate'
    ? 'aggregate: enter a pipeline array, e.g. <code>[{"$group": {"_id": "$species", "count": {"$sum": 1}}}]</code>'
    : 'find: enter a filter object, e.g. <code>{"status": "active"}</code>';
  renderExamples(mode);
}

function renderExamples(mode) {
  const el = document.getElementById('examples');
  el.innerHTML = '<span class="text-muted small me-1">Examples:</span>';
  EXAMPLES[mode].forEach(ex => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-sm btn-outline-secondary';
    btn.textContent = ex.label;
    btn.onclick = () => { document.getElementById('queryInput').value = ex.query; };
    el.appendChild(btn);
  });
}

function flattenValue(val) {
  if (val === null || val === undefined) return '—';
  if (typeof val === 'object') return JSON.stringify(val);
  return val;
}

function runQuery() {
  const collection = document.getElementById('collection').value;
  const mode = document.getElementById('mode').value;
  const query = document.getElementById('queryInput').value;

  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('errorArea').style.display = 'none';

  apiCall('/query/run', 'POST', { collection, mode, query })
    .then(data => {
      if (data.error) {
        document.getElementById('errorArea').textContent = data.error;
        document.getElementById('errorArea').style.display = 'block';
        return;
      }
      const rows = data.rows;
      document.getElementById('resultTitle').textContent = collection + ' — ' + mode;
      document.getElementById('resultCount').textContent = rows.length + ' result' + (rows.length !== 1 ? 's' : '');

      if (rows.length === 0) {
        document.getElementById('resultHead').innerHTML = '';
        document.getElementById('resultBody').innerHTML = '<tr><td class="text-muted">No results.</td></tr>';
      } else {
        const keys = Object.keys(rows[0]);
        document.getElementById('resultHead').innerHTML =
          '<tr>' + keys.map(k => '<th>' + k + '</th>').join('') + '</tr>';
        document.getElementById('resultBody').innerHTML =
          rows.map(r => '<tr>' + keys.map(k => '<td>' + flattenValue(r[k]) + '</td>').join('') + '</tr>').join('');
      }
      document.getElementById('resultArea').style.display = 'block';
    });
}

renderExamples('find');
</script>
{% endblock %}
