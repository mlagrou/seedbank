{% extends "base.html" %}
{% block title %} — Guests{% endblock %}
{% block content %}
<h2>Event Guests</h2>
<p class="text-muted">All guests extracted from event attendance records.</p>
<div class="table-responsive">
  <table class="table table-bordered table-hover shadow-sm">
    <thead>
      <tr><th>Event</th><th>Guest Name</th><th>Email</th></tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.event_name }}</td>
        <td>{{ row.name }}</td>
        <td>{{ row.email }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
