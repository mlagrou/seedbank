<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV Seedbank{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f8f2; }
        .navbar { background-color: #2d6a4f !important; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .nav-link:hover { color: #b7e4c7 !important; }
        .nav-link.active { color: #b7e4c7 !important; font-weight: 600; }
        h2 { color: #2d6a4f; margin-top: 1.5rem; }
        h4 { color: #40916c; margin-top: 1.5rem; }
        .table thead { background-color: #40916c; color: white; }
        .badge-count { background-color: #95d5b2; color: #1b4332; font-size: 0.85rem; padding: 4px 10px; border-radius: 20px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">SV Seedbank</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/species">Species</a></li>
                <li class="nav-item"><a class="nav-link" href="/inventory">Inventory</a></li>
                <li class="nav-item"><a class="nav-link" href="/members">Members</a></li>
                <li class="nav-item"><a class="nav-link" href="/batch">Batches</a></li>
                <li class="nav-item"><a class="nav-link" href="/distributions">Distributions</a></li>
                <li class="nav-item"><a class="nav-link" href="/activities">Activities</a></li>
                <li class="nav-item"><a class="nav-link" href="/events">Events</a></li>
                <li class="nav-item"><a class="nav-link" href="/guests">Guests</a></li>
                <li class="nav-item"><a class="nav-link" href="/partners">Partners</a></li>
                <li class="nav-item"><a class="nav-link" href="/analytics">Analytics</a></li>
                <li class="nav-item"><a class="nav-link" href="/query">Custom Query</a></li>
            </ul>
        </div>
    </div>
</nav>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div class="container pb-5">
    {% block content %}{% endblock %}
</div>
<script>
function apiCall(url, method, data) {
  return fetch(url, {
    method: method,
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  })
  .then(r => r.text().then(text => {
    try { return JSON.parse(text); }
    catch(e) { throw new Error('Server error (' + r.status + '): ' + text.slice(0, 200)); }
  }))
  .catch(err => { alert('Error: ' + err.message); throw err; });
}
</script>
</body>
</html>
