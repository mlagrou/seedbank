{% extends "base.html" %}
{% block title %} — Partners{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Partner Organizations</h2>
  <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addModal">+ Add Partner</button>
</div>

<div class="table-responsive">
  <table class="table table-bordered table-hover shadow-sm">
    <thead>
      <tr><th>Organization</th><th>Contact</th><th>Email</th><th>Address</th><th>Actions</th></tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td>{{ r.p_name }}</td>
        <td>{{ r.contact or '—' }}</td>
        <td>{{ r.email }}</td>
        <td>{{ r.address or '—' }}</td>
        <td class="text-nowrap">
          <button class="btn btn-sm btn-outline-primary me-1"
            data-id="{{ r._id }}"
            data-name="{{ r.p_name }}"
            data-contact="{{ r.contact or '' }}"
            data-email="{{ r.email }}"
            data-address="{{ r.address or '' }}"
            onclick="openEdit(this)">Edit</button>
          <button class="btn btn-sm btn-outline-danger"
            data-id="{{ r._id }}"
            onclick="doDelete('/partners/' + this.dataset.id)">Delete</button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<!-- Add Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add Partner</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="addForm">
          <div class="mb-2"><label class="form-label">Organization Name *</label>
            <input type="text" class="form-control" name="p_name" required></div>
          <div class="mb-2"><label class="form-label">Contact Person</label>
            <input type="text" class="form-control" name="contact"></div>
          <div class="mb-2"><label class="form-label">Email</label>
            <input type="email" class="form-control" name="email"></div>
          <div class="mb-2"><label class="form-label">Address</label>
            <input type="text" class="form-control" name="address"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="submitForm('/partners', 'POST', 'addForm', addModal)">Add Partner</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Edit Partner</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <form id="editForm">
          <div class="mb-2"><label class="form-label">Organization Name *</label>
            <input type="text" class="form-control" name="p_name" id="editName" required></div>
          <div class="mb-2"><label class="form-label">Contact Person</label>
            <input type="text" class="form-control" name="contact" id="editContact"></div>
          <div class="mb-2"><label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" id="editEmail"></div>
          <div class="mb-2"><label class="form-label">Address</label>
            <input type="text" class="form-control" name="address" id="editAddress"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitEdit()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script>
const addModal = new bootstrap.Modal(document.getElementById('addModal'));
const editModal = new bootstrap.Modal(document.getElementById('editModal'));

function openEdit(btn) {
  document.getElementById('editId').value = btn.dataset.id;
  document.getElementById('editName').value = btn.dataset.name;
  document.getElementById('editContact').value = btn.dataset.contact;
  document.getElementById('editEmail').value = btn.dataset.email;
  document.getElementById('editAddress').value = btn.dataset.address;
  editModal.show();
}

function submitEdit() {
  submitForm('/partners/' + document.getElementById('editId').value, 'PUT', 'editForm', editModal);
}

function submitForm(url, method, formId, modal) {
  const data = Object.fromEntries(new FormData(document.getElementById(formId)));
  fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) })
    .then(r => r.json()).then(() => location.reload());
}

function doDelete(url) {
  if (!confirm('Delete this partner? This cannot be undone.')) return;
  fetch(url, { method: 'DELETE' }).then(r => r.json()).then(() => location.reload());
}
</script>
{% endblock %}
