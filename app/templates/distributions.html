{% extends "base.html" %}
{% block title %} — Distributions{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Seed Distributions</h2>
  <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addModal">+ Add Distribution</button>
</div>

<div class="table-responsive">
  <table class="table table-bordered table-hover shadow-sm">
    <thead>
      <tr><th>Member</th><th>Species</th><th>Quantity</th><th>Date</th><th>Actions</th></tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td>{{ r.member }}</td>
        <td>{{ r.species }}</td>
        <td>{{ r.quantity }}</td>
        <td>{{ r.date }}</td>
        <td class="text-nowrap">
          <button class="btn btn-sm btn-outline-primary me-1"
            data-id="{{ r._id }}"
            data-member="{{ r.member }}"
            data-species="{{ r.species }}"
            data-quantity="{{ r.quantity }}"
            data-date="{{ r.date }}"
            onclick="openEdit(this)">Edit</button>
          <button class="btn btn-sm btn-outline-danger"
            data-id="{{ r._id }}"
            onclick="doDelete('/distributions/' + this.dataset.id)">Delete</button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<!-- Add Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add Distribution</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="addForm">
          <div class="mb-2"><label class="form-label">Member *</label>
            <input type="text" class="form-control" name="member" required placeholder="Full name"></div>
          <div class="mb-2"><label class="form-label">Species *</label>
            <input type="text" class="form-control" name="species" required></div>
          <div class="mb-2"><label class="form-label">Quantity *</label>
            <input type="number" class="form-control" name="quantity" min="1" required></div>
          <div class="mb-2"><label class="form-label">Date</label>
            <input type="date" class="form-control" name="date"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="submitForm('/distributions', 'POST', 'addForm', addModal)">Add Distribution</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Edit Distribution</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <form id="editForm">
          <div class="mb-2"><label class="form-label">Member *</label>
            <input type="text" class="form-control" name="member" id="editMember" required></div>
          <div class="mb-2"><label class="form-label">Species *</label>
            <input type="text" class="form-control" name="species" id="editSpecies" required></div>
          <div class="mb-2"><label class="form-label">Quantity *</label>
            <input type="number" class="form-control" name="quantity" id="editQty" min="1" required></div>
          <div class="mb-2"><label class="form-label">Date</label>
            <input type="date" class="form-control" name="date" id="editDate"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitEdit()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script>
const addModal = new bootstrap.Modal(document.getElementById('addModal'));
const editModal = new bootstrap.Modal(document.getElementById('editModal'));

function openEdit(btn) {
  document.getElementById('editId').value = btn.dataset.id;
  document.getElementById('editMember').value = btn.dataset.member;
  document.getElementById('editSpecies').value = btn.dataset.species;
  document.getElementById('editQty').value = btn.dataset.quantity;
  document.getElementById('editDate').value = btn.dataset.date;
  editModal.show();
}

function submitEdit() {
  submitForm('/distributions/' + document.getElementById('editId').value, 'PUT', 'editForm', editModal);
}

function submitForm(url, method, formId, modal) {
  const data = Object.fromEntries(new FormData(document.getElementById(formId)));
  fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) })
    .then(r => r.json()).then(() => location.reload());
}

function doDelete(url) {
  if (!confirm('Delete this distribution? This cannot be undone.')) return;
  fetch(url, { method: 'DELETE' }).then(r => r.json()).then(() => location.reload());
}
</script>
{% endblock %}
